# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "ja"

reviews:
  profile: "concise"
  request_changes_workflow: true
  high_level_summary: true
  collapse_walkthrough: false
  assess_linked_issues: true

  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
    drafts: false
    base_branches:
      - "main"

  # レビュー対象/除外パス
  # ! プレフィックスで除外
  path_filters:
    - "packages/**"
    - "scripts/**"
    - "tests/**"
    - "pyproject.toml"
    - "Taskfile.yml"
    - "taskfiles/**"
    - "!**/*.md"
    - "!templates/**"
    - "!.claude/**"
    - "!**/__pycache__/**"
    - "!*.lock"
    - "!checkpoints/**"
    - "!*.egg-info/**"

  # パス別レビュー指示
  path_instructions:
    - path: "packages/*/hooks/**/*.py"
      instructions: |
        エージェントフックのコード。以下を重点確認:
        - エージェント選択ロジックの正確性
        - エラーハンドリング（hook は失敗しても Claude Code を止めない設計）
        - hook_common.py の共通ユーティリティの正しい利用
        - セキュリティ（外部入力のバリデーション）
    - path: "packages/agent-routing/config/**/*.yaml"
      instructions: |
        エージェントルーティング設定。以下を確認:
        - キーの整合性とツール参照の有効性
        - 新規エージェント追加時の必須フィールド
        - シークレットの埋め込みがないか
    - path: "scripts/**/*.py"
      instructions: |
        管理スクリプト（orchestra-manager, sync-orchestra）。以下を優先確認:
        - 引数解析の正確性
        - ファイルシステム操作の安全性（symlink, パス解決）
        - エラー時の適切なメッセージ出力
    - path: "packages/**/*.yaml"
      instructions: |
        パッケージ設定ファイル。YAML シンタックスの正確性と必須フィールドの存在を確認。
    - path: "tests/**/*.py"
      instructions: |
        テストコード。テストの網羅性とアサーションの適切さを確認。

chat:
  auto_reply: true
